<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - PLASISE</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/img/favicon.ico">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS (Luxe) -->
    <link href="../assets/css/luxe.css" rel="stylesheet">
    <style>
        .luxe-navbar { z-index: 1050; }
        .luxe-logo { height: 45px; }
        .luxe-title { color: var(--luxe-dark); font-family: 'Playfair Display', serif; }
        .luxe-submit-btn { letter-spacing: 1px; }
    </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">


    <!-- Navigation (Luxe standard nav) -->
    <nav class="navbar navbar-expand-lg luxe-navbar bg-white w-100 p-0 shadow-sm">
        <div class="container py-2 d-flex justify-content-between align-items-center">
            <a class="navbar-brand m-0 p-0" href="index.html" aria-label="Ir a página de inicio">
                <img src="../assets/img/logo.jpg" alt="PLASISE Logo" class="luxe-logo">
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="productos.html" class="nav-link text-dark"><i class="fas fa-store"></i> <span
                        class="d-none d-md-inline ms-1" title="Ver Catálogo">Catálogo</span></a>
            </div>
        </div>
    </nav>


    <!-- Main Content -->
    <main class="container py-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row justify-content-center w-100">
            <div class="col-lg-6 col-md-9 col-sm-12 bg-white p-4 p-md-5 rounded shadow-sm border">
                
                <h2 class="mb-2 fw-bold text-center luxe-title">Crear Cuenta</h2>
                <p class="text-muted text-center mb-4">Únete a la plataforma PLASISE</p>

                <div id="alertContainer"></div>

                <form id="registerForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nombre" class="form-label text-muted small fw-bold text-uppercase">Nombre</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" id="nombre" placeholder="Tu nombre" title="Introduce tu nombre" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="apellidos" class="form-label text-muted small fw-bold text-uppercase">Apellidos</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" id="apellidos" placeholder="Tus apellidos" title="Introduce tus apellidos" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label text-muted small fw-bold text-uppercase">Email</label>
                        <input type="email" class="form-control form-control-lg bg-light border-0" id="email" placeholder="ejemplo@email.com" title="Introduce un email válido" required>
                    </div>
                    <div class="mb-3">
                        <label for="telefono" class="form-label text-muted small fw-bold text-uppercase">Teléfono</label>
                        <input type="tel" class="form-control form-control-lg bg-light border-0" id="telefono" placeholder="Ej: 600123456" title="Introduce tu número de teléfono">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label for="password" class="form-label text-muted small fw-bold text-uppercase">Contraseña</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0" id="password" placeholder="Mínimo 6 caracteres" title="Introduce una contraseña de al menos 6 caracteres" required minlength="6">
                        </div>
                        <div class="col-md-6 mb-4">
                            <label for="confirmPassword" class="form-label text-muted small fw-bold text-uppercase">Confirmar Contraseña</label>
                            <input type="password" class="form-control form-control-lg bg-light border-0" id="confirmPassword" placeholder="Repite tu contraseña" title="Confirma tu contraseña" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="privacyPolicy" required title="Aceptar política de privacidad">
                            <label class="form-check-label small text-muted" for="privacyPolicy">
                                He leído y acepto la <a href="legales/politica-privacidad.html" target="_blank" rel="noopener" class="text-dark fw-bold">Política de Privacidad</a>
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-dark w-100 mb-4 py-3 text-uppercase fw-bold luxe-submit-btn" id="submitBtn">
                        Crear Cuenta
                    </button>
                </form>

                <div class="text-center mt-3 pt-3 border-top">
                    <p class="mb-0 text-muted">¿Ya tienes cuenta? <a href="login.html" class="text-dark fw-bold text-decoration-none border-bottom border-dark pb-1">Inicia sesión</a></p>
                </div>

            </div>
        </div>
    </main>


    <!-- Footer Unificado -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-2">&copy; 2026 PLASISE. Todos los derechos reservados.</p>
            <div class="legal-links small">
                <a href="legales/aviso-legal.html" class="text-white-50 text-decoration-none mx-2">Aviso Legal</a> | 
                <a href="legales/politica-privacidad.html" class="text-white-50 text-decoration-none mx-2">Privacidad</a> | 
                <a href="legales/politica-cookies.html" class="text-white-50 text-decoration-none mx-2">Cookies</a>
            </div>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/config.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const privacy = document.getElementById('privacyPolicy').checked;
            if (!privacy) { document.getElementById('alertContainer').innerHTML = '<div class="alert alert-warning">Debes aceptar la política de privacidad para continuar</div>'; return; }
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (pass !== confirm) { document.getElementById('alertContainer').innerHTML = '<div class="alert alert-danger">Las contrasenas no coinciden</div>'; return; }
            const data = {
                nombre: document.getElementById('nombre').value.trim(),
                apellidos: document.getElementById('apellidos').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                password: pass,
                acepta_privacidad: true // Se envía explícitamente ya que es obligatorio
            };
            btn.disabled = true; btn.textContent = 'Registrando...';
            try {
                const r = await fetch(API_URL + '/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const d = await r.json();
                if (r.ok) {
                    document.getElementById('alertContainer').innerHTML = '<div class="alert alert-success">Cuenta creada! Redirigiendo...</div>';
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    document.getElementById('alertContainer').innerHTML = '<div class="alert alert-danger">' + (d.error || 'Error') + '</div>';
                    btn.disabled = false; btn.textContent = 'Crear Cuenta';
                }
            } catch (e) {
                document.getElementById('alertContainer').innerHTML = '<div class="alert alert-danger">Error de conexion</div>';
                btn.disabled = false; btn.textContent = 'Crear Cuenta';
            }
        });
    </script>

<!-- Cookies Banner -->
    <link rel="stylesheet" href="../assets/css/cookies.css">
    <script src="../assets/js/cookies.js"></script>
</body>
