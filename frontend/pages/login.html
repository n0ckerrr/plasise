    <script>
        // Configurar URL base de la API
        const API_BASE_URL = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'https://n0cker-plasise.v6hb8q.easypanel.host' : (window.location.pathname.startsWith('/plasise') ? window.location.origin + '/plasise' : window.location.origin);

        // Verificar si ya hay sesión activa
        async function checkSession() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/session`, {
                    credentials: 'include'
                });
                const data = await response.json();

                if (data.authenticated) {
                    // Ya está logueado, redirigir
                    window.location.href = 'productos.html';
                }
            } catch (error) {
                console.error('Error al verificar sesión:', error);
            }
        }

        // Verificar sesión al cargar la página
        checkSession();

        // Manejar formulario de login
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            // Validación básica
            if (!email || !password) {
                showAlert('Por favor complete todos los campos', 'warning');
                return;
            }

            if (!email.includes('@')) {
                showAlert('Por favor ingrese un email válido', 'warning');
                return;
            }

            // Deshabilitar botón durante el envío
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Iniciando sesión...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showAlert('¡Inicio de sesión exitoso! Redirigiendo...', 'success');

                    // Redirigir después de un breve delay
                    setTimeout(() => {
                        window.location.href = 'productos.html';
                    }, 1000);
                } else {
                    showAlert(data.error || 'Email o contraseña incorrectos', 'danger');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar Sesión';
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error de conexión con el servidor. Verifique que el backend esté funcionando.', 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar Sesión';
            }
        });

        function showAlert(message, type) {
            const alert = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            document.getElementById('alertContainer').innerHTML = alert;

            // Scroll al top para ver el mensaje
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
